<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Padel tournament counter</title>
  <meta name="application-name" content="Padel tournament counter">
  <meta name="apple-mobile-web-app-title" content="Padel tournament counter">
  <meta property="og:title" content="Padel tournament counter">
  <meta property="og:image" content="assets/app-icon.png">
  <link rel="icon" type="image/png" href="./assets/app-icon.png">
  <link rel="apple-touch-icon" href="./assets/app-icon.png">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0c1820;
      --card: #ffffff;
      --text: #111827;
      --muted: #5f6b7a;
      --blue: #0a84ff;
      --green: #20c997;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #102532 0%, #061018 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }
    main {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.26);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 6vw, 56px);
      line-height: 1.02;
      letter-spacing: 0;
    }
    p {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
      margin: 0 0 28px;
    }
    nav {
      display: grid;
      gap: 14px;
    }
    a {
      display: block;
      padding: 18px 20px;
      border: 1px solid #d7dde6;
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
    }
    a:hover {
      border-color: var(--blue);
      color: var(--blue);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .app-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(10, 132, 255, 0.24);
    }
    .badge {
      display: inline-block;
      color: var(--green);
      background: rgba(32, 201, 151, 0.12);
      border: 1px solid rgba(32, 201, 151, 0.28);
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img class="app-icon" src="./assets/app-icon.png" width="64" height="64" alt="Padel tournament counter app icon">
      <div class="badge">Offline-first iOS app</div>
    </div>
    <h1>Padel tournament counter</h1>
    <p>
      Padel tournament counter helps organizers run padel Americano-style tournaments,
      generate rotating doubles schedules, enter scores, and share results.
    </p>
    <nav aria-label="App pages">
      <a href="./privacy-policy/">Privacy Policy</a>
      <a href="./support/">Support</a>
    </nav>
  </main>
</body>
</html>
